<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <!-- Console HUD Annotated Diagram
       All positions computed from src/hud.c at 1920x1080 (s = 1.333)
       Colors from Grid theme (src/theme.c)

       Layout computation:
         s = powf(1080/720, 0.7) = 1.333
         primary_h = 160, transport_h = 37
         bar_y(transport) = 883, bar_y(primary) = 920
         inst_radius = 64, compass_cx = 91, adi_cx = 245, inst_y = 993
         sep1_x = 331, sep2_x = 831, sep3_x = 1499
         item_step = 167, item_x0 = 352
         NAV: 352, 519, 686  ENERGY: 853, 1020, 1186, 1353
         label_y = 941, value_y = 970
         timer_x = 1520, numpad_x = 1632, status_x = 1752
  -->
  <defs>
    <style>
      .hud-bg { fill: rgba(10, 14, 20, 0.86); }
      .sep { stroke: rgba(0, 180, 204, 0.20); stroke-width: 1; }
      .accent { fill: rgb(0, 180, 204); }
      .accent-dim { fill: rgba(0, 180, 204, 0.55); }
      .value { fill: rgb(200, 208, 218); font-family: 'JetBrains Mono', ui-monospace, monospace; }
      .label { fill: rgba(0, 180, 204, 0.55); font-family: 'Inter', -apple-system, sans-serif; font-weight: 600; letter-spacing: 0.05em; }
      .dim { fill: rgba(200, 208, 218, 0.39); font-family: 'Inter', -apple-system, sans-serif; }
      .adi-sky { fill: rgba(80, 140, 200, 0.78); }
      .adi-ground { fill: rgba(120, 85, 50, 0.78); }
      .adi-wing { fill: rgb(255, 255, 0); }
      .annot-line { stroke: rgb(255, 255, 255); stroke-width: 1; stroke-dasharray: 4 3; opacity: 0.5; }
      .annot-bg { fill: rgba(255, 255, 255, 0.9); }
      .annot-text { fill: rgb(10, 14, 20); font-family: 'Inter', -apple-system, sans-serif; font-size: 12px; font-weight: 600; }
      .annot-num { fill: rgb(10, 14, 20); font-family: 'Inter', -apple-system, sans-serif; font-size: 11px; font-weight: 800; }
    </style>
  </defs>

  <!-- 3D viewport background -->
