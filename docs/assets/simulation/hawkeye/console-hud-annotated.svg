    <rect x="32" y="64" width="29" height="29" rx="3" fill="none" stroke="rgba(0,180,204,0.4)" />
    <text x="46" y="84" fill="rgba(200,208,218,0.5)" text-anchor="middle">8</text>
    <rect x="64" y="64" width="29" height="29" rx="3" fill="none" stroke="rgba(0,180,204,0.4)" />
