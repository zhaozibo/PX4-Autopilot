  <circle cx="650" cy="901" r="5" fill="rgb(200, 208, 218)" stroke="rgb(0, 180, 204)" stroke-width="1.5" />
  <text x="24" y="907" class="value" font-size="13" font-weight="700">1.0x</text>
  <text x="56" y="907" class="value" font-size="13">2:14</text>
