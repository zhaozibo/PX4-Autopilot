<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <!-- Coordinate Systems Diagram (09-dia-02)
       NED (MAVLink/PX4 input) vs Raylib Y-up (rendering)
       Colors from Grid theme axis colors:
         axis_x = rgb(200, 60, 60)   -> North/Right
         axis_z = rgb(60, 60, 200)   -> Down/Back
         Y axis = rgb(60, 200, 60)   -> East/Up
  -->
  <defs>
    <style>
      .bg { fill: rgb(10, 14, 20); }
      .title { fill: rgb(200, 208, 218); font-family: 'Inter', -apple-system, sans-serif; font-size: 18px; font-weight: 700; }
      .subtitle { fill: rgba(200, 208, 218, 0.5); font-family: 'Inter', -apple-system, sans-serif; font-size: 12px; }
      .axis-label { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 14px; font-weight: 700; }
      .axis-desc { font-family: 'Inter', -apple-system, sans-serif; font-size: 11px; fill: rgba(200, 208, 218, 0.6); }
      .section { font-family: 'Inter', -apple-system, sans-serif; font-size: 15px; font-weight: 700; fill: rgb(0, 180, 204); }
      .section-sub { font-family: 'Inter', -apple-system, sans-serif; font-size: 11px; fill: rgba(0, 180, 204, 0.6); }
      .mapping { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600; fill: rgb(200, 208, 218); }
      .mapping-dim { font-family: 'Inter', sans-serif; font-size: 11px; fill: rgba(200, 208, 218, 0.45); }
      .card { fill: rgba(200, 208, 218, 0.04); stroke: rgba(0, 180, 204, 0.2); stroke-width: 1; rx: 6; }
    </style>
    <marker id="ax" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="rgb(200, 60, 60)" />
    </marker>
    <marker id="ay" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="rgb(60, 200, 60)" />
    </marker>
    <marker id="az" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="rgb(60, 60, 200)" />
    </marker>
    <marker id="arrow-map" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="rgba(200, 208, 218, 0.5)" />
    </marker>
  </defs>

  <rect width="800" height="400" class="bg" />

  <text x="400" y="34" class="title" text-anchor="middle">Coordinate Systems</text>
  <text x="400" y="52" class="subtitle" text-anchor="middle">NED (MAVLink input) to Raylib Y-up (rendering)</text>

  <!-- ═══════════════════════════════════════
       LEFT: NED coordinate system
       ═══════════════════════════════════════ -->
  <rect x="30" y="72" width="320" height="296" class="card" />
  <text x="190" y="100" class="section" text-anchor="middle">NED</text>
  <text x="190" y="116" class="section-sub" text-anchor="middle">MAVLink / PX4 / ULog</text>

  <!-- NED axes origin at (190, 230) -->
  <g transform="translate(190, 230)">
    <!-- X = North (up in this view) -->
    <line x1="0" y1="0" x2="0" y2="-80" stroke="rgb(200, 60, 60)" stroke-width="2.5" marker-end="url(#ax)" />
    <text x="8" y="-68" class="axis-label" fill="rgb(200, 60, 60)">X</text>
    <text x="24" y="-68" class="axis-desc">North</text>

    <!-- Y = East (right) -->
    <line x1="0" y1="0" x2="80" y2="0" stroke="rgb(60, 200, 60)" stroke-width="2.5" marker-end="url(#ay)" />
    <text x="68" y="-8" class="axis-label" fill="rgb(60, 200, 60)">Y</text>
    <text x="68" y="20" class="axis-desc">East</text>

    <!-- Z = Down (into page, shown as diagonal) -->
    <line x1="0" y1="0" x2="50" y2="50" stroke="rgb(60, 60, 200)" stroke-width="2.5" marker-end="url(#az)" />
    <text x="56" y="48" class="axis-label" fill="rgb(60, 60, 200)">Z</text>
    <text x="56" y="66" class="axis-desc">Down</text>

    <!-- Origin dot -->
    <circle r="4" fill="rgb(200, 208, 218)" />
  </g>

  <!-- Drone icon (simple top-down quad shape) -->
  <g transform="translate(190, 230)" opacity="0.3">
    <line x1="-20" y1="-20" x2="20" y2="20" stroke="rgb(200, 208, 218)" stroke-width="1" />
    <line x1="20" y1="-20" x2="-20" y2="20" stroke="rgb(200, 208, 218)" stroke-width="1" />
    <circle cx="-20" cy="-20" r="6" fill="none" stroke="rgb(200, 208, 218)" stroke-width="0.8" />
    <circle cx="20" cy="-20" r="6" fill="none" stroke="rgb(200, 208, 218)" stroke-width="0.8" />
    <circle cx="-20" cy="20" r="6" fill="none" stroke="rgb(200, 208, 218)" stroke-width="0.8" />
    <circle cx="20" cy="20" r="6" fill="none" stroke="rgb(200, 208, 218)" stroke-width="0.8" />
  </g>

  <!-- ═══════════════════════════════════════
       RIGHT: Raylib Y-up coordinate system
       ═══════════════════════════════════════ -->
  <rect x="450" y="72" width="320" height="296" class="card" />
  <text x="610" y="100" class="section" text-anchor="middle">Raylib Y-up</text>
  <text x="610" y="116" class="section-sub" text-anchor="middle">Rendering / draw space</text>

  <!-- Raylib axes origin at (610, 250) -->
  <g transform="translate(610, 250)">
    <!-- X = Right -->
    <line x1="0" y1="0" x2="80" y2="0" stroke="rgb(200, 60, 60)" stroke-width="2.5" marker-end="url(#ax)" />
    <text x="68" y="-8" class="axis-label" fill="rgb(200, 60, 60)">X</text>
    <text x="68" y="20" class="axis-desc">Right</text>

    <!-- Y = Up -->
    <line x1="0" y1="0" x2="0" y2="-80" stroke="rgb(60, 200, 60)" stroke-width="2.5" marker-end="url(#ay)" />
    <text x="8" y="-68" class="axis-label" fill="rgb(60, 200, 60)">Y</text>
    <text x="24" y="-68" class="axis-desc">Up</text>

    <!-- Z = Back (toward viewer, shown as diagonal) -->
    <line x1="0" y1="0" x2="-50" y2="50" stroke="rgb(60, 60, 200)" stroke-width="2.5" marker-end="url(#az)" />
    <text x="-66" y="48" class="axis-label" fill="rgb(60, 60, 200)">Z</text>
    <text x="-66" y="66" class="axis-desc">Back</text>

    <!-- Origin dot -->
    <circle r="4" fill="rgb(200, 208, 218)" />
  </g>

  <!-- Drone icon -->
  <g transform="translate(610, 250)" opacity="0.3">
    <line x1="-20" y1="-20" x2="20" y2="20" stroke="rgb(200, 208, 218)" stroke-width="1" />
    <line x1="20" y1="-20" x2="-20" y2="20" stroke="rgb(200, 208, 218)" stroke-width="1" />
    <circle cx="-20" cy="-20" r="6" fill="none" stroke="rgb(200, 208, 218)" stroke-width="0.8" />
    <circle cx="20" cy="-20" r="6" fill="none" stroke="rgb(200, 208, 218)" stroke-width="0.8" />
    <circle cx="-20" cy="20" r="6" fill="none" stroke="rgb(200, 208, 218)" stroke-width="0.8" />
    <circle cx="20" cy="20" r="6" fill="none" stroke="rgb(200, 208, 218)" stroke-width="0.8" />
  </g>

  <!-- ═══════════════════════════════════════
       CENTER: Mapping arrows
       ═══════════════════════════════════════ -->
  <g transform="translate(400, 200)">
    <!-- NED X (North) -> Raylib -Z (Back negated) -->
    <text x="-8" y="-20" class="mapping" text-anchor="middle">X → -Z</text>
    <text x="-8" y="-4" class="mapping-dim" text-anchor="middle">North → Forward</text>

    <!-- NED Y (East) -> Raylib X (Right) -->
    <text x="-8" y="24" class="mapping" text-anchor="middle">Y → X</text>
    <text x="-8" y="40" class="mapping-dim" text-anchor="middle">East → Right</text>

    <!-- NED Z (Down) -> Raylib -Y (Up negated) -->
    <text x="-8" y="68" class="mapping" text-anchor="middle">Z → -Y</text>
    <text x="-8" y="84" class="mapping-dim" text-anchor="middle">Down → Up (negated)</text>
  </g>

  <!-- Arrow between the two cards -->
  <line x1="350" y1="220" x2="450" y2="220" stroke="rgba(200, 208, 218, 0.3)" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#arrow-map)" />

</svg>
